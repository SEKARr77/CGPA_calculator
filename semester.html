<!DOCTYPE html>
<html>
<head>
<title>CGPA Calculator</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}
select, button{
    padding:10px;
    margin-top:15px;
    width:200px;
}
button{
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#1a252f;
}
</style>
</head>
<body>

<div class="container">
<h2>Select Semester</h2>

<select id="semester">
    <option value="">-- Choose Semester --</option>
    <option value="sem1.html">Semester 1</option>
    <option value="sem2.html">Semester 2</option>
    <option value="sem3.html">Semester 3</option>
</select>

<br>
<button onclick="goToSemester()">Submit</button>
</div>

<script>
function goToSemester(){
    let sem = document.getElementById("semester").value;
    if(sem === ""){
        alert("Please select a semester");
    } else {
        window.location.href = sem;
    }
}
</script>

</body>
</html>
