<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overall CGPA | AZHAM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
}

.container{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:420px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.calculate-btn{
    background:#00f5d4;
    color:#1e3c72;
}

.calculate-btn:hover{
    background:white;
    transform:scale(1.05);
}

.back-btn{
    background:#ffffff20;
    color:white;
}

.result{
    margin-top:20px;
    font-size:20px;
    font-weight:600;
    color:#00f5d4;
}

/* Responsive */
@media(max-width:480px){
    .container{
        padding:30px 20px;
    }
}
</style>
</head>

<body>

<div class="container">
<h2>Overall CGPA Calculator</h2>

<input type="number" step="0.01" id="sem1" placeholder="Enter Semester 1 SGPA">
<input type="number" step="0.01" id="sem2" placeholder="Enter Semester 2 SGPA">
<input type="number" step="0.01" id="sem3" placeholder="Enter Semester 3 SGPA">

<button class="calculate-btn" onclick="calculateCGPA()">Calculate CGPA</button>
<button class="back-btn" onclick="goBack()">Back</button>

<div id="result" class="result"></div>

</div>

<script>
function calculateCGPA(){
    let s1 = parseFloat(document.getElementById("sem1").value) || 0;
    let s2 = parseFloat(document.getElementById("sem2").value) || 0;
    let s3 = parseFloat(document.getElementById("sem3").value) || 0;

    if(s1==0 || s2==0 || s3==0){
        alert("Please enter all semester SGPA values");
        return;
    }

    let cgpa = ((s1 + s2 + s3) / 3).toFixed(2);

    document.getElementById("result").innerHTML = "Overall CGPA: " + cgpa;
}

function goBack(){
    window.location.href="semester.html";
}
</script>

</body>
</html>
