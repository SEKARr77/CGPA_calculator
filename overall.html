<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overall CGPA | AZHAM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
}
.container{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:450px;
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    font-weight:600;
    margin-top:10px;
    cursor:pointer;
}
.calculate-btn{
    background:#00f5d4;
    color:#1e3c72;
}
.result{
    margin-top:20px;
    font-size:20px;
    font-weight:600;
    color:#00f5d4;
}
</style>
</head>

<body>

<div class="container">
<h2>Overall CGPA Calculator</h2>

<!-- Semester 1 -->
<input type="number" step="0.01" id="s1" placeholder="Semester 1 SGPA">


<!-- Semester 2 -->
<input type="number" step="0.01" id="s2" placeholder="Semester 2 SGPA">


<!-- Semester 3 -->
<input type="number" step="0.01" id="s3" placeholder="Semester 3 SGPA">


<button class="calculate-btn" onclick="calculateCGPA()">Calculate CGPA</button>

<div id="result" class="result"></div>

</div>

<script>
function calculateCGPA(){
    let s1 = parseFloat(document.getElementById("s1").value);
    
    let s2 = parseFloat(document.getElementById("s2").value);

    let s3 = parseFloat(document.getElementById("s3").value);
   

    if(!s1 || !s2 || !s3  ){
        alert("Please enter all SGPA and Credit values");
        return;
    }

    let totalPoints = (s1*20) + (s2*23) + (s3*22);
    let totalCredits = 20 + 23 + 22;

    let cgpa = (totalPoints / totalCredits).toFixed(2);

    document.getElementById("result").innerHTML = "Overall CGPA: " + cgpa;
}
</script>

</body>
</html>
